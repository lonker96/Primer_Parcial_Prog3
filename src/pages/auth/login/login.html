<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store login</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/assets/css/login.css">
</head>

<body>
    <li><a id="boton-inicio" href="/src/pages/client/home/home.html">Inicio</a></li>
    <div class="container">
        <form id="form" class="login-form">
            <h1>FOOD STORE</h1>
            <h2>Iniciar Sesion</h2>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Minimo 8 caracteres" required>

            <button type="submit"> INGRESAR </button>

            <p class="registro">
                ¿No tenes cuenta? <a href="/src/pages/auth/registro/registro.html">Registrate aca</a>
            </p>
        </form>

    </div>
    <script type="module" src="./login.ts"></script>
</body>

</html>
