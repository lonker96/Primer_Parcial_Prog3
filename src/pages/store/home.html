<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo</title>
    <link rel="stylesheet" href="/src/assets/css/store.css">
</head>
<body>
    <header>
        <h1>FoodStore</h1>
        <div class="header-nav">
        <a href="/src/pages/store/cart/cart.html" id="link-carrito">Carrito
            <span id="carrito-count" class="badge">0</span>
        </a>
        <a href="/src/pages/store/home.html" id="link-catalogo">Catalogo</a>
        </div>
    </header>

    
    <div class="layaout-container">
        <aside class="sidebar">
            <nav id="menu-categorias">
                <h3>Categorias</h3>
                <button class="btn-filtro active" data-categoria="todos">Todos los productos</button>
                <button class="btn-filtro" data-categoria="Pizzas">Pizzas</button>
                <button class="btn-filtro" data-categoria="Hamburguesas">Hamburguesas</button>
                <button class="btn-filtro" data-categoria="Bebidas">Bebidas</button>
                <button class="btn-filtro" data-categoria="Postres">Postres</button>
                <button class="btn-filtro" data-categoria="Empanadas">Empanadas</button>
                <button class="btn-filtro" data-categoria="Ensaladas">Ensaladas</button>
            </nav>
        </aside>
        <main class="main-content">
            <div class="busqueda-container">
                <input type="text" id="input-busqueda" placeholder="Buscar Productos...">
            </div>
            <h2>Productos</h2>
            <section id="contenedor-productos"></section>
        </main>
    </div>  
    <script type="module" src="./home.ts"></script>
</body>
</html>
